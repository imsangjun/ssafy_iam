<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Im Sangjun Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css');
        :root {
            --bg-color: #000000;
        }
        body { font-family: 'Paperlogy', sans-serif; background-color: var(--bg-color); }
        .card { background-color: #ffffff; border-radius: 20px; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen text-black">

    <div class="max-w-[1400px] mx-auto grid grid-cols-12 gap-2">
        
        <!-- Header -->
        <header class="col-span-12 card p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col">
                <span class="text-[0.7rem] font-light tracking-widest text-gray-400">My FaVorIte Mus!cs</span>
                <h1 class="text-5xl font-black tracking-tighter">Im Sangjun</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="triggerAnimation('band')" class="px-6 py-2 border border-black rounded-full font-light text-sm hover:bg-black hover:text-white transition">Band</button>
                <button onclick="triggerAnimation('hiphop')" class="px-6 py-2 border border-black rounded-full font-light text-sm hover:bg-black hover:text-white transition">Hip-hop</button>
            </div>
        </header>

        <!-- Sidebar Left -->
        <aside class="col-span-12 md:col-span-3 card p-8 flex flex-col justify-between">
            <div>
                <h2 class="text-4xl font-bold leading-tight mb-6">My<br>FaVorIte<br>Mus!cs</h2>
                <p class="text-sm text-gray-500 font-light leading-relaxed">
                    다양한 음악을 좋아합니다. 깊이는 얕디 얕습니다.
                </p>
            </div>
            <div class="flex gap-4 mt-12 text-gray-400">
                <span>♡</span> <span>RSS</span> <span>TW</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="col-span-12 md:col-span-6 grid grid-cols-1 md:grid-cols-2 gap-2">
            <!-- Specification Section -->
            <div class="card p-8 min-h-[400px] flex flex-col justify-center">
                <div class="text-xs font-bold text-gray-400 mb-6 tracking-widest uppercase">Main Hobbies</div>
                <div class="text-sm font-light leading-loose space-y-2">
                    <p>Photography</p>
                    <p>Coffee Brewing</p>
                    <p>Reading</p>
                    <p>Coding</p>
                </div>
            </div>
            <!-- Silicagel Section -->
            <div class="card overflow-hidden relative flex flex-col justify-center">
                <img src="silicagel_01.jpg" alt="Silicagel" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='https://placehold.co/400x400/000000/ffffff?text=Silicagel';">
            </div>
        </main>

        <!-- Sidebar Right -->
        <div id="sidebar-right" class="col-span-12 md:col-span-3 flex flex-col gap-2">
            <!-- Stay Connected (Filled with Image) -->
            <div id="stay-connected" class="card relative overflow-hidden h-[180px] flex items-center justify-center">
                <img src="thepoles.jpg" alt="the poles" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                    <h3 class="text-white font-bold text-2xl tracking-widest">the poles</h3>
                </div>
            </div>
            <!-- SIKK Section -->
            <div id="sikk" class="card relative overflow-hidden h-[180px]">
                <img src="fd3447dafa28143af029edb3c54e132a.jpg" alt="SIKK" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='https://placehold.co/400x400/cccccc/ffffff?text=Image';">
                <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                    <h3 class="text-white font-bold text-3xl tracking-widest">KC</h3>
                </div>
            </div>
            <!-- YE Section -->
            <div id="ye" class="card relative overflow-hidden h-[180px]">
                <img src="ye.jpg" alt="YE" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='https://placehold.co/400x400/cccccc/ffffff?text=YE';">
                <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                    <h3 class="text-white font-bold text-3xl tracking-widest">YE</h3>
                </div>
            </div>
        </div>

    </div>

    <script>
        function triggerAnimation(type) {
            const sikk = document.getElementById('sikk');
            const ye = document.getElementById('ye');
            const stayConnected = document.getElementById('stay-connected');

            // Reset animation
            [sikk, ye, stayConnected].forEach(el => el.classList.remove('shake'));
            void sikk.offsetWidth; 

            if (type === 'band') {
                stayConnected.classList.add('shake');
                sikk.classList.add('shake');
            } else if (type === 'hiphop') {
                ye.classList.add('shake');
            }
        }
    </script>
</body>
</html>
