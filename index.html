<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobbies & Music</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css');

        :root {
            --bg-color: #000000;
            --card-bg: #ffffff;
            --card-border-radius: 20px;
            --text-dark: #000000;
            --text-light: #666666;
            --font-family: 'Paperlogy', sans-serif;
            --font-thin: 300;
            --font-reg: 400;
            --font-bold: 700;
            --gap-size: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 20% 1fr 20%;
            grid-template-rows: auto auto 1fr;
            gap: var(--gap-size);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--card-border-radius);
            padding: 24px;
        }

        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; }
        .logo-sub { font-size: 0.7rem; font-weight: var(--font-thin); display: flex; flex-direction: column; }
        .logo-text { font-size: 3rem; font-weight: var(--font-bold); letter-spacing: -2px; line-height: 0.9; }
        
        .header-nav { display: flex; align-items: center; gap: 15px; }
        .nav-btn {
            padding: 8px 20px;
            border: 1px solid var(--text-dark);
            border-radius: 20px;
            background: none;
            cursor: pointer;
            font-weight: var(--font-reg);
            font-family: var(--font-family);
        }

        .sidebar-left { grid-column: 1 / 2; grid-row: 2 / 4; }
        .brand-title { font-size: 2.5rem; font-weight: var(--font-bold); line-height: 1; margin-bottom: 20px; }
        .brand-desc { font-size: 0.9rem; color: var(--text-light); font-weight: var(--font-thin); }

        .main-content { grid-column: 2 / 3; grid-row: 2 / 4; }
        .spec-title { font-size: 1rem; font-weight: var(--font-bold); margin-bottom: 20px; }
        .spec-column { margin-bottom: 30px; }
        .spec-label { font-size: 0.8rem; font-weight: var(--font-bold); color: var(--text-light); margin-bottom: 8px; }
        .spec-text { font-weight: var(--font-reg); line-height: 1.8; }

        .sidebar-right { grid-column: 3 / 4; grid-row: 2 / 4; display: flex; flex-direction: column; gap: var(--gap-size); }
        .mini-card { background: #f4f4f4; border-radius: 15px; padding: 20px; }

    </style>
</head>
<body>

    <div class="container">
        <header class="card header">
            <div class="logo-area">
                <div class="logo-sub">
                    <span>MY HOBBY</span>
                    <span>& MUSIC</span>
                </div>
                <div class="logo-text">Profile</div>
            </div>
            <div class="header-nav">
                <button class="nav-btn">HOBBIES (4)</button>
                <button class="nav-btn">MUSIC (12)</button>
                <button class="nav-btn">🛒</button>
            </div>
        </header>

        <aside class="card sidebar-left">
            <h1 class="brand-title">My<br>Favorite<br>Things</h1>
            <p class="brand-desc">
                음악을 사랑하고 다양한 취미를 즐기며 일상 속 작은 영감을 수집합니다.
            </p>
        </aside>

        <main class="card main-content">
            <div class="spec-title">SPECIFICATION</div>
            <div class="spec-column">
                <div class="spec-label">MAIN HOBBIES</div>
                <div class="spec-text">Photography • Coffee Brewing • Reading • Coding</div>
            </div>
            <div class="spec-column">
                <div class="spec-label">MUSIC TASTE</div>
                <div class="spec-text">Indie Pop, Alt Rock, City Pop</div>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="card mini-card">
                <h3>Stay Connected</h3>
                <p style="font-weight: var(--font-thin); font-size: 0.8rem; margin-top: 10px;">작업물 공유 및 소통 환영합니다.</p>
            </div>
            <div class="card mini-card" style="height: 200px;">
                <!-- 이미지 영역 -->
            </div>
        </aside>
    </div>
</body>
</html>
