    <title>Im Sangjun Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css');
        :root {
            --bg-color: #000000;
        }
        body { font-family: 'Paperlogy', sans-serif; background-color: var(--bg-color); }
        .card { background-color: #ffffff; border-radius: 20px; transition: all 0.3s ease; }
        
        /* Transition Overlay */
        #transition-overlay {
            z-index: 100;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.18, 1);
        }

        /* STREAMING_CHUNK:Configuring interactions and effects... */
        .hover-invert { transition: filter 0.3s ease; cursor: pointer; }
        .hover-invert:hover { filter: invert(1); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen text-black">

    <!-- Transition Overlay -->
    <div id="transition-overlay" class="fixed inset-0 bg-black scale-0"></div>

    <div class="max-w-[1400px] mx-auto grid grid-cols-12 gap-2">
        
        <!-- Header -->
        <header class="col-span-12 bg-[#2430C5] text-[#FFFF00] p-6 rounded-[20px] flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col">
                <span class="text-[0.7rem] font-light tracking-widest opacity-80">My FaVorIte Mus!cs</span>
                <h1 class="text-5xl font-black tracking-tighter">Im Sangjun</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="triggerAnimation('band')" class="px-6 py-2 border border-[#FFFF00] rounded-full font-light text-sm hover:bg-[#FFFF00] hover:text-[#2430C5] transition">Band</button>
                <button onclick="triggerAnimation('hiphop')" class="px-6 py-2 border border-[#FFFF00] rounded-full font-light text-sm hover:bg-[#FFFF00] hover:text-[#2430C5] transition">Hip-hop</button>
            </div>
        </header>

        <!-- Sidebar Left -->
        <aside class="col-span-12 md:col-span-3 card p-8 flex flex-col justify-between">
            <div>
                <h2 class="text-4xl font-bold leading-tight mb-6">My<br>FaVorIte<br>Mus!cs</h2>

            <div class="flex gap-3 mt-12">

                    <svg class="w-4 h-4 text-gray-800 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                <div class="w-8 h-8 rounded-full border-2 border-gray-800 flex items-center justify-center">
                    <svg class="w-4 h-4 text-gray-800 fill-current" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="col-span-12 md:col-span-6 grid grid-cols-1 md:grid-cols-2 gap-2">
            <div class="card p-8 min-h-[400px] flex flex-col justify-start">
                <h2 class="text-4xl font-bold leading-tight mb-8">Please<br>share your<br>taste</h2>
                <div class="text-sm font-light leading-relaxed text-gray-600 space-y-4">
                    <p>좋은 노래 있으면 공유 부탁드립니다.</p>

                </div>
            </div>
            <!-- Silicagel -->
            <a id="silicagel-section" href="https://www.youtube.com/watch?v=2lVLJCK4Tbo" target="_blank" class="nav-link card hover-invert overflow-hidden relative flex flex-col justify-center">
                <img src="silicagel_01.jpg" alt="Silicagel" class="w-full h-full object-cover transition-all duration-300" onerror="this.onerror=null;this.src='https://placehold.co/400x400/000000/ffffff?text=Silicagel';">

                <img src="aphex.jpg" alt="Aphex" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='https://placehold.co/400x400/cccccc/ffffff?text=Aphex';">
            </a>
        </div>

    </div>

    <script>
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const url = this.href;
                const id = this.id;
                const overlay = document.getElementById('transition-overlay');
                
                if (id === 'silicagel-section') {
                    overlay.style.transformOrigin = 'left';
                    overlay.style.transform = 'scaleX(1)';
                } else if (id === 'stay-connected') {
                    overlay.style.transformOrigin = 'top';
                    overlay.style.transform = 'scaleY(1)';
                } else if (id === 'sikk') {
                    overlay.style.transformOrigin = 'right';
                    overlay.style.transform = 'scaleX(1)';
                } else if (id === 'ye' || id === 'aphex') {
                    overlay.style.transformOrigin = 'bottom';
                    overlay.style.transform = 'scaleY(1)';
                } else {
                    overlay.style.transformOrigin = 'center';
                    overlay.style.transform = 'scale(1)';
                }
                
                setTimeout(() => {
                    window.location.href = url;
                }, 800);
            });
        });

        function triggerAnimation(type) {
            const silicagel = document.getElementById('silicagel-section');
            const sikk = document.getElementById('sikk');
            const ye = document.getElementById('ye');
            const stayConnected = document.getElementById('stay-connected');
            const aphex = document.getElementById('aphex');

            [silicagel, sikk, ye, stayConnected, aphex].forEach(el => el.classList.remove('shake'));
            void sikk.offsetWidth; 

            if (type === 'band') {
                stayConnected.classList.add('shake');
                silicagel.classList.add('shake');
            } else if (type === 'hiphop') {
                sikk.classList.add('shake');
                ye.classList.add('shake');
            }
        }
    </script>
</body>
